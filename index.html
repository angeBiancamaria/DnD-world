<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Professional Navbar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .nav-link {
        position: relative;
        transition: all 0.3s ease;
      }
      .nav-link::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -4px;
        left: 0;
        background-color: currentColor;
        transition: width 0.3s ease;
      }
      .nav-link:hover::after {
        width: 100%;
      }
      .dropdown:hover .dropdown-menu {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }
      .dropdown-menu {
        box-shadow:
          0 10px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }
      .mobile-menu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-out;
      }
      .mobile-menu.open {
        max-height: 1000px;
        transition: max-height 0.5s ease-in;
      }
      .badge {
        font-size: 0.65rem;
        top: -0.5rem;
        right: -0.5rem;
      }
      .avatar-ring {
        box-shadow:
          0 0 0 2px white,
          0 0 0 4px #3b82f6;
      }
    </style>
  </head>
  <body
    style="background-image: url(&quot;./background.jpg&quot;)"
    class="bg-cover bg-center min-h-screen"
  >
    <!-- Premium Professional Navigation Bar -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <!-- Left Section - Logo/Brand -->
          <div class="flex items-center">
            <a href="#" class="flex items-center group">
              <div
                class="bg-blue-600 group-hover:bg-blue-700 p-2 rounded-lg transition-colors duration-300"
              >
                <i class="fas fa-cube text-white text-xl"></i>
              </div>
              <span
                class="ml-3 text-xl font-bold text-gray-800 group-hover:text-blue-600 transition-colors duration-300"
                >E2C JDR</span
              >
            </a>
          </div>

          <!-- Center Section - Main Navigation (Desktop) -->
          <div class="hidden md:flex items-center space-x-1">
            <div class="dropdown relative">
              <a href="https://e2c.corsica">
                <button
                  class="nav-link text-gray-700 hover:text-blue-600 px-4 py-2 flex items-center rounded-lg hover:bg-blue-50 transition-colors duration-200"
                >
                  <i class="fas fa-home mr-2"></i>
                  acceuil E2C
                </button>
              </a>
            </div>

            <a
              href="https://e2c.corsica/contact/"
              class="nav-link text-gray-700 hover:text-blue-600 px-4 py-2 flex items-center rounded-lg hover:bg-blue-50 transition-colors duration-200"
            >
              <i class="fas fa-envelope mr-2"></i>
              Contact
            </a>
          </div>

          <!-- Right Section - Actions -->
          <div class="flex items-center space-x-3">
            <div class="hidden md:block h-6 w-px bg-gray-200"></div>

            <button
              id="mobile-menu-button"
              class="md:hidden p-2 text-gray-600 hover:text-blue-600 rounded-lg hover:bg-gray-100 transition-colors duration-200"
            >
              <i class="fas fa-bars text-xl"></i>
              <span class="sr-only">Menu</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Mobile Menu -->
      <div
        id="mobile-menu"
        class="mobile-menu md:hidden bg-white border-t border-gray-200"
      >
        <div class="px-2 pt-2 pb-4 space-y-1">
          <a
            href="#"
            class="block px-4 py-3 rounded-lg text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 flex items-center transition-colors duration-200"
          >
            <i class="fas fa-home text-blue-500 mr-3 w-5 text-center"></i>
            Home
          </a>

          <a
            href="https://e2c.corsica/contact/"
            class="block px-4 py-3 rounded-lg text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 flex items-center transition-colors duration-200"
          >
            <i class="fas fa-envelope text-blue-500 mr-3 w-5 text-center"></i>
            Contact
          </a>
        </div>
      </div>
    </nav>
    <h1 class="text-4xl text-red-600 font-bold text-center mt-8 mb-4">
      Welcome to Rouenne
    </h1>
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 mt-10">
      <img src="./map.jpg" alt="Map" class="w-full h-auto object-cover" />
    </div>

    <!-- JavaScript for enhanced functionality -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Enhanced mobile menu toggle with animation
        const mobileMenuButton = document.getElementById("mobile-menu-button");
        const mobileMenu = document.getElementById("mobile-menu");

        if (mobileMenuButton && mobileMenu) {
          mobileMenuButton.addEventListener("click", function () {
            const isExpanded = mobileMenu.classList.contains("open");
            if (isExpanded) {
              mobileMenu.classList.remove("open");
              setTimeout(() => {
                mobileMenu.classList.add("hidden");
              }, 300); // Match this with the transition duration
            } else {
              mobileMenu.classList.remove("hidden");
              // Trigger reflow to enable animation
              void mobileMenu.offsetHeight;
              mobileMenu.classList.add("open");
            }

            // Toggle aria-expanded attribute
            const expanded = this.getAttribute("aria-expanded") === "true";
            this.setAttribute("aria-expanded", !expanded);

            // Change icon
            const icon = this.querySelector("i");
            if (icon) {
              icon.classList.toggle("fa-bars");
              icon.classList.toggle("fa-times");
            }
          });
        }

        // Improved dropdown handling
        const dropdowns = document.querySelectorAll(".dropdown");

        dropdowns.forEach((dropdown) => {
          const button = dropdown.querySelector("button");
          const menu = dropdown.querySelector(".dropdown-menu");

          if (button && menu) {
            // Handle click
            button.addEventListener("click", (e) => {
              e.stopPropagation();
              const isOpen = !menu.classList.contains("opacity-0");

              // Close all other dropdowns first
              document.querySelectorAll(".dropdown-menu").forEach((m) => {
                if (m !== menu) {
                  m.classList.add("opacity-0", "invisible", "-translate-y-2");
                }
              });

              // Toggle current dropdown
              if (isOpen) {
                menu.classList.add("opacity-0", "invisible", "-translate-y-2");
              } else {
                menu.classList.remove(
                  "opacity-0",
                  "invisible",
                  "-translate-y-2",
                );
              }
            });

            // Handle hover for desktop
            if (window.innerWidth > 768) {
              dropdown.addEventListener("mouseenter", () => {
                menu.classList.remove(
                  "opacity-0",
                  "invisible",
                  "-translate-y-2",
                );
              });

              dropdown.addEventListener("mouseleave", () => {
                menu.classList.add("opacity-0", "invisible", "-translate-y-2");
              });
            }
          }
        });

        // Close dropdowns when clicking outside
        document.addEventListener("click", function () {
          document.querySelectorAll(".dropdown-menu").forEach((menu) => {
            menu.classList.add("opacity-0", "invisible", "-translate-y-2");
          });
        });

        // Handle window resize
        window.addEventListener("resize", function () {
          if (window.innerWidth > 768 && mobileMenu) {
            mobileMenu.classList.remove("open");
            mobileMenu.classList.add("hidden");
            const menuButton = document.getElementById("mobile-menu-button");
            if (menuButton) {
              menuButton.setAttribute("aria-expanded", "false");
              const icon = menuButton.querySelector("i");
              if (icon) {
                icon.classList.add("fa-bars");
                icon.classList.remove("fa-times");
              }
            }
          }
        });

        // Add active state to current page link (example)
        const currentPath =
          window.location.pathname.split("/").pop() || "index.html";
        document.querySelectorAll(".nav-link").forEach((link) => {
          const href = link.getAttribute("href");
          if (href && href.includes(currentPath)) {
            link.classList.add("text-blue-600", "font-medium");
            link.classList.remove("text-gray-700");
          }
        });
      });
    </script>
  </body>
</html>
